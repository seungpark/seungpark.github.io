name: Build Pages artifact (deploy on master)

on:
  push:
    branches:
      - master
      - vite-remake

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Make sure custom domain stays.
      # This copies repo's CNAME into the published artifact.
      - run: |
          if [ -f CNAME ]; then
            cp public/CNAME dist/CNAME
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4